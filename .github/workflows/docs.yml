name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/generated/**"
      - "packages/gen/src/adapters/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Build forge-ts packages
        run: pnpm build

      - name: Generate docs with forge-ts
        run: npx forge-ts build --human

      - name: Install docs site dependencies
        working-directory: docs/generated/site
        run: pnpm install

      - name: Build docs site
        working-directory: docs/generated/site
        run: pnpm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/generated/site/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
